[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "case_nps"
version = "0.0.1"
description = "Tech Challenge \u00e9 o projeto que englobar\u00e1 os conhecimentos obtidos em todas"
authors = [
  { name = "Felipe Nadal" },
]

readme = "README.md"
classifiers = [
    "Programming Language :: Python :: 3",
    
]
requires-python = "~=as disciplinas da fase. Esta � uma atividade que, em princ�pio, deve ser desenvolvida.0"

[tool.black]
line-length = 99
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
)/
'''

[tool.isort]
profile = "black"
known_first_party = ["case_nps"]
force_sort_within_sections = true